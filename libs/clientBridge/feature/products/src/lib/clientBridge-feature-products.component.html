<div class="card-container">
  <mat-card class="widget-card max-md-widget">
    <mat-card-content>
      <form [formGroup]="uploadForm" class="flex flex-col h-full gap-3  !w-1/3">
        <h1>Personal information</h1>
        <mat-form-field hideRequiredMarker class="!w-full">
          <mat-label>Inter your first name</mat-label>
          <input matInput formControlName="name" />
          <mat-error>
            <insurance-error-message [input]="uploadForm.get('name')" />
          </mat-error>
        </mat-form-field>
        <mat-form-field class="!w-full">
          <mat-label>Your birthday</mat-label>
          <input
            matInput
            [matDatepicker]="picker"
            [max]="today"
            formControlName="birthDate"
          />
          <mat-datepicker-toggle
            matIconSuffix
            [for]="picker"
          ></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
          <mat-error>
            <insurance-error-message [input]="uploadForm.get('birthDate')" />
          </mat-error>
        </mat-form-field>
        <mat-form-field hideRequiredMarker class="!w-full">
          <mat-label>Your national code</mat-label>
          <input
            matInput
            formControlName="nationalCode"
            inputmode="numeric"
            pattern="\d*"
          />
          <mat-error>
            <insurance-error-message [input]="uploadForm.get('nationalCode')" />
          </mat-error>
        </mat-form-field>
        <mat-form-field hideRequiredMarker class="!w-full">
          <mat-label>Your number</mat-label>
          <input matInput formControlName="number" />
          <mat-error>
            <insurance-error-message [input]="uploadForm.get('number')" />
          </mat-error>
          <button type="button" mat-icon-button matSuffix>
            <mat-icon svgIcon="phone" />
          </button>
        </mat-form-field>
        <insurance-client-bridge-feature-products-upload-file />
        <div class="submit-container">
          <button class="!mt-5 w-full" mat-flat-button type="submit">
            Continue
          </button>
          @if ((isHandsetScreen$ | async) === false){
            <button
              class="!mt-5 w-full"
              mat-stroked-button
              type="button"
              color="primary"
            >
              Back
            </button>
          }
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
