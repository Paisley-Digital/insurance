
<mat-accordion >
  <div class="p-4">
    <mat-expansion-panel hideToggle="true">
      <mat-expansion-panel-header class="flex justify-center items-center gap-6">
        <mat-icon svgIcon="home" />
        <span class="!mt-1 ms-4">Dashboard</span>
      </mat-expansion-panel-header>
    </mat-expansion-panel>
  </div>
  <div class="p-4">
    <div class="!text-[#d3d3d3] ms-5">Menu</div>
    <mat-expansion-panel hideToggle="true">
      <mat-expansion-panel-header class="flex justify-center items-center gap-6">
        <mat-icon svgIcon="management" />
        <span class="!mt-1 ms-4">Customer management</span>
      </mat-expansion-panel-header>
    </mat-expansion-panel>
    <mat-expansion-panel hideToggle="true">
      <mat-expansion-panel-header class="flex justify-center items-center gap-6">
        <mat-icon svgIcon="report" />
        <span class="!mt-1 ms-4">Reports</span>
      </mat-expansion-panel-header>
    </mat-expansion-panel>
    <mat-expansion-panel hideToggle="true">
      <mat-expansion-panel-header class="flex justify-center items-center gap-6">
        <mat-icon svgIcon="payment" />
        <span class="!mt-1 ms-4">Payment</span>
      </mat-expansion-panel-header>
    </mat-expansion-panel>
    <mat-expansion-panel hideToggle="true">
      <mat-expansion-panel-header class="flex justify-center items-center gap-6">
        <mat-icon svgIcon="cog" />
        <span class="!mt-1 ms-4">Settings</span>
      </mat-expansion-panel-header>
    </mat-expansion-panel>
    <mat-expansion-panel hideToggle="true" (click)="logout()">
      <mat-expansion-panel-header class="flex justify-center items-center gap-6">
        <mat-icon svgIcon="logout" />
        <span class="!mt-1 ms-4">Logout</span>
      </mat-expansion-panel-header>
    </mat-expansion-panel>
  </div>
</mat-accordion>
