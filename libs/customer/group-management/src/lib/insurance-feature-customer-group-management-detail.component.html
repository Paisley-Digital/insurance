<div class="card-container">
  <mat-card class="widget-card max-md-widget">
    <mat-card-header>
      <div class="divButtonUpload">
        <span class="font-medium">
          List of Louis Vuitton insurance employees
        </span>
        <div class="flex flex-col gap-2">
          <input
            type="file"
            class="hidden"
            multiple
            accept=".jpg, .jpeg, .png"
            (change)="onFilesSelected($event)"
            #fileInput
          />
          <div class="divButton">
            <button mat-flat-button class="uploadButton" (click)="fileInput.click()">
              New
              <mat-icon svgIcon="add"></mat-icon>
            </button>
            <button mat-stroked-button class="!text-blue-900" (click)="openDialog()">
              Cross Checking
              <mat-icon svgIcon="scan" color="primary"/>
            </button>
          </div>
        </div>
      </div>

    </mat-card-header>
    <mat-card-content class="content">
      <div class="card-grid">
        @for (file of uploadedFiles; track file) {
          <div class="card-item">
            <mat-card class="example-card" appearance="outlined">
              <div class="a">
                <div class="b">
                  <div class="c">
                    <mat-icon svgIcon="building"></mat-icon>
                  </div>
                  <div class="textCard">
                    Employee insurance form
                  </div>
                </div>
                <div class="flex items-center ml-auto ">
                  <section>
                    <mat-checkbox color="primary" />
                  </section>
                </div>
              </div>
              <div class="divider"></div>
              <div class="content-list">
                <div class="divImage">
                  <img mat-card-image [src]="file.url" alt="{{ file.name }}" />
                  <div>
                    {{ file.name }}
                  </div>
                </div>
              </div>
            </mat-card>
          </div>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>

<ng-template #openDialogCrossDialog>
  <h4 mat-dialog-title>Cross Checking</h4>

  <mat-dialog-content class="mat-typography">
    <div class="flex items-center justify-center">
      <div #lottie></div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-flat-button [mat-dialog-close]="true" class="backgroandButton" cdkFocusInitial>Open Excel</button>
    <button mat-stroked-button mat-dialog-close class="textColorButton">Cancel</button>
  </mat-dialog-actions>

</ng-template>
